name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Dependencies
        run: go mod download

      - name: Run Unit Tests
        shell: bash
        run: |
          PACKAGES="$(go list ./... | grep -v '^github.com/yedou37/ddb/test/e2e$' | tr '\n' ' ')"
          go test ${PACKAGES} -coverprofile=coverage.out

      - name: Show Coverage Summary
        run: go tool cover -func=coverage.out

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Dependencies
        run: go mod download

      - name: Run E2E Tests
        run: go test ./test/e2e -v -timeout 25m
